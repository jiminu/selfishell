name: Dependency updates

on:
  schedule:
    - cron: '00 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: dependency-updates
  cancel-in-progress: false

jobs:
  update:
    name: Check approved dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt zsh

      - name: Update dependency manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/update-dependencies.sh

      - name: Validate updated manifest
        run: bash scripts/check.sh

      - name: Create or refresh dependency update PR
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: automation/dependency-updates
        run: |
          tracked_files=(dependencies.conf common/completion.zsh common/interactive.zsh)
          git diff --quiet -- "${tracked_files[@]}" && {
            printf 'All approved dependencies are current.\n'
            exit 0
          }
          unexpected="$(git status --porcelain -- . ':!dependencies.conf' ':!common/completion.zsh' ':!common/interactive.zsh')"
          [[ -z "$unexpected" ]] || {
            printf 'Dependency update touched unexpected files:\n%s\n' "$unexpected" >&2
            exit 1
          }
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin "$BRANCH" || true
          git checkout -B "$BRANCH"
          git add "${tracked_files[@]}"
          git commit -m 'Update approved dependencies'
          git push --force-with-lease origin "HEAD:$BRANCH"
          gh pr list --head "$BRANCH" --state open --json number --jq 'length' | grep -q '^0$' && gh pr create \
            --base main \
            --head "$BRANCH" \
            --title 'Update approved dependencies' \
            --body 'Updates pinned direct dependencies and verified download checksums. Review release notes and CI results before merging. This workflow never merges or releases automatically.'

      - name: Create or resolve failure issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ job.status }}
        run: bash scripts/workflow-failure-issue.sh '[automation] Dependency updates failed' "$RESULT" "$RUN_URL"
