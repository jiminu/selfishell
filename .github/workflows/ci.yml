name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    name: Shell checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            interactive_p95_budget_ms: 150
          - os: macos-latest
            interactive_p95_budget_ms: 200

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install shell tooling (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt zsh

      - name: Install shell tooling (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck shfmt

      - name: Run checks
        run: bash scripts/check.sh

      - name: Measure interactive shell performance
        env:
          SELFISHELL_BENCHMARK_COMMON_P95_MAX_MS: 50
          SELFISHELL_BENCHMARK_HELP_P95_MAX_MS: 50
          SELFISHELL_BENCHMARK_INTERACTIVE_P95_MAX_MS: ${{ matrix.interactive_p95_budget_ms }}
          SELFISHELL_BENCHMARK_RESULTS_FILE: ${{ runner.temp }}/selfishell-benchmark.tsv
          SELFISHELL_BENCHMARK_VERSION_P95_MAX_MS: 50
        run: bash scripts/benchmark.sh

      - name: Upload performance result
        uses: actions/upload-artifact@v7
        with:
          name: shell-performance-${{ runner.os }}
          path: ${{ runner.temp }}/selfishell-benchmark.tsv

  ubuntu-container-e2e:
    name: Ubuntu 24.04 container installation E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ubuntu:24.04

    steps:
      - name: Install container prerequisites
        run: |
          apt-get update
          apt-get install -y ca-certificates curl

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run real installation lifecycle
        run: bash scripts/ubuntu-container-e2e.sh

  neovim-developer-e2e:
    name: Pinned Neovim developer E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install pinned mise
        run: |
          SELFISHELL_ROOT="$GITHUB_WORKSPACE"
          export SELFISHELL_ROOT
          source lib/common.sh
          source lib/paths.sh
          source lib/dependencies.sh
          dependency_install mise linux amd64

      - name: Install pinned Neovim toolchain
        run: ~/.local/bin/mise install neovim@0.12.4 tree-sitter@0.26.11 node@24.18.0

      - name: Run real Neovim lifecycle
        run: ~/.local/bin/mise exec neovim@0.12.4 tree-sitter@0.26.11 node@24.18.0 -- bash scripts/neovim-e2e.sh
