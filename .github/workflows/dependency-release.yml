name: Dependency patch release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: dependency-patch-release
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch approved dependency release
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'automation/dependency-updates'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out merged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Verify dependency-only change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: bash scripts/verify-dependency-release-diff.sh --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Dispatch next patch release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          version="$(bash scripts/next-patch-version.sh)"
          printf 'Dispatching Selfishell %s from %s.\n' "$version" "$RELEASE_REF"
          gh workflow run release.yml --ref main -f version="$version" -f ref="$RELEASE_REF"

      - name: Create or resolve failure issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ job.status }}
        run: bash scripts/workflow-failure-issue.sh '[automation] Dependency patch dispatch failed' "$RESULT" "$RUN_URL"
