name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Stable or pre-release version without the v prefix
        required: true
        type: string
      ref:
        description: Commit or ref to release
        required: true
        default: main
        type: string

permissions:
  artifact-metadata: write
  attestations: write
  contents: write
  id-token: write
  issues: write

concurrency:
  group: release-${{ github.event_name == 'push' && github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.ref }}

      - name: Install shell tooling (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt zsh

      - name: Install shell tooling (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck shfmt

      - name: Run verification suite
        run: bash scripts/check.sh

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && github.ref || inputs.ref }}

      - name: Validate release tag
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          PUSHED_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
        run: |
          if [[ -n "$PUSHED_TAG" ]]; then
            TAG="$PUSHED_TAG"
            version="${TAG#v}"
          else
            version="$REQUESTED_VERSION"
            TAG="v$version"
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            printf 'Invalid release tag: %s\n' "$TAG" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >>"$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$TAG" >>"$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: bash scripts/build-release.sh --version '${{ steps.version.outputs.version }}' --output dist

      - name: Generate signed build provenance
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Smoke test exact release
        env:
          SELFISHELL_BOOTSTRAP_OS: Linux
          SELFISHELL_BOOTSTRAP_ARCH: x86_64
          SELFISHELL_RELEASE_ROOT: file://${{ runner.temp }}/selfishell-releases
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          release_dir="$RUNNER_TEMP/selfishell-releases/download/v$VERSION"
          mkdir -p "$release_dir"
          cp dist/* "$release_dir/"
          prefix="$RUNNER_TEMP/selfishell-prefix"
          bash install.sh --version "$VERSION" --prefix "$prefix"
          test "$("$prefix/bin/selfishell" version)" = "selfishell $VERSION"

      - name: Create immutable release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git rev-parse "refs/tags/$TAG" >/dev/null 2>&1 && {
            printf 'Release tag already exists: %s\n' "$TAG" >&2
            exit 1
          }
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a "$TAG" -m "Selfishell ${TAG#v}"
          git push origin "$TAG"

      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          release_args=()
          [[ "$TAG" != *-* ]] || release_args+=(--prerelease)
          gh release view "$TAG" >/dev/null 2>&1 && {
            printf 'Release already exists: %s\n' "$TAG" >&2
            exit 1
          }
          gh release create "$TAG" dist/* --verify-tag --generate-notes \
            --title "Selfishell $TAG" "${release_args[@]}"

  notify:
    name: Report release automation result
    if: always()
    needs: [verify, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Check out notification script
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Create or resolve failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ needs.verify.result == 'success' && needs.publish.result == 'success' && 'success' || 'failure' }}
        run: bash scripts/workflow-failure-issue.sh '[automation] Release failed' "$RESULT" "$RUN_URL"
